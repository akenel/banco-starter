# ================================================================
# Banco POS — PRODUCTION overlay (the opinionated go-live stack).
#
# Adds Caddy in front for automatic HTTPS, and flips Keycloak into production
# mode with its real public hostname. Everything else comes from compose.yml.
#
# Generate the config + Caddyfile:   python3 scripts/go-live.py
# Deploy (backup → build → gate):     ./scripts/deploy-prod.sh
#   (which runs: docker compose -f compose.yml -f compose.prod.yml up -d --build)
#
# Caddy reaches the app + Keycloak over the internal compose network by service
# name (app:8000, keycloak:8080) and is the only thing the public internet talks
# to. Lock the server firewall to 22/80/443 so the raw ports aren't exposed.
# ================================================================
services:

  caddy:
    image: caddy:2.8
    container_name: banco-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro   # generated by scripts/go-live.py
      - caddy_data:/data                       # Let's Encrypt certs live here (persist!)
      - caddy_config:/config
    depends_on:
      - app
      - keycloak

  keycloak:
    # Production mode: real hostname, trust the proxy for TLS, strict hostname.
    # `start` (not start-dev) is the prod entrypoint; it auto-builds on first boot.
    command: ["start", "--import-realm", "--http-port=8080"]
    environment:
      KC_HOSTNAME: ${KC_PUBLIC_HOST}
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

volumes:
  caddy_data:
  caddy_config:
